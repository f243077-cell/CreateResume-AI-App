  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^4.0.4
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
