name: createresume_app
description: AI-powered resume builder with ATS optimization.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6
  app_links: ^7.2.0
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  go_router: ^17.3.0
  flutter_dotenv: ^6.0.1
  shared_preferences: ^2.3.1
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.4
  http: ^1.2.2
  lottie: ^3.1.2
  google_fonts: ^8.1.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.3
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  uuid: ^4.4.2
  intl: ^0.20.3
  file_picker: 8.3.7
  image_picker: ^1.1.2
  open_file: ^4.0.0
  hive_flutter: ^1.1.0
  smooth_page_indicator: ^2.0.1
  connectivity_plus: ^7.2.0

